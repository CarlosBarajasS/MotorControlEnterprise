events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 10M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    upstream backend {
        server backend:8080;
    }

    upstream mediamtx {
        server central-mediamtx:8889;
    }

    upstream frontend {
        server frontend:80;
    }

    # ─── HTTP → HTTPS redirect ────────────────────────────────────
    server {
        listen 80;
        server_name nirmgroup.net www.nirmgroup.net;
        return 301 https://$host$request_uri;
    }

    # ─── HTTPS principal ─────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name nirmgroup.net www.nirmgroup.net;

        ssl_certificate     /etc/nginx/certs/nirmgroup.pem;
        ssl_certificate_key /etc/nginx/certs/nirmgroup.key;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # Health check (sin log)
        location /health {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            access_log off;
        }

        # Swagger UI
        location /swagger {
            proxy_pass http://backend/swagger;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # WebRTC WHEP — nginx agrega credenciales internamente (viewer nunca expuesto al browser)
        location ~* /whep(/[^/]+)?$ {
            proxy_pass http://mediamtx;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            include /etc/nginx/secrets/mediamtx-auth.conf;
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
        }

        # REST API
        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_read_timeout 60s;
        }

        # Frontend Angular (SPA)
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ─── Fallback para acceso por IP — solo red local ────────────
    server {
        listen 80 default_server;
        listen 443 ssl default_server;
        server_name _;

        ssl_certificate     /etc/nginx/certs/nirmgroup.pem;
        ssl_certificate_key /etc/nginx/certs/nirmgroup.key;

        # Solo permitir red local — bloquear acceso externo directo por IP
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        allow 127.0.0.1;
        deny all;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }

        location /health {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            access_log off;
        }

        location /swagger {
            proxy_pass http://backend/swagger;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location ~* /whep(/[^/]+)?$ {
            proxy_pass http://mediamtx;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            include /etc/nginx/secrets/mediamtx-auth.conf;
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
        }

        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_read_timeout 60s;
        }

        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
