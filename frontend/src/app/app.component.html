<ng-container *ngIf="showSidebar(); else loginOnly">
    <div class="app-shell">
        <!-- Mobile top-bar: solo visible en ≤768px -->
        <div class="mobile-topbar">
            <div class="mobile-logo">
                <img src="assets/logo-dark-sm.png?v=3" alt="NIRM GROUP" width="30" height="30" class="logo-for-dark">
                <img src="assets/logo-light-sm.png?v=3" alt="NIRM GROUP" width="30" height="30" class="logo-for-light">
                <span class="mobile-logo-text">Enterprise</span>
            </div>
            <button class="hamburger-btn" (click)="toggleSidebar()" [attr.aria-expanded]="sidebarOpen" aria-label="Menú">
                <svg *ngIf="!sidebarOpen" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="3" y1="6" x2="21" y2="6"/>
                    <line x1="3" y1="12" x2="21" y2="12"/>
                    <line x1="3" y1="18" x2="21" y2="18"/>
                </svg>
                <svg *ngIf="sidebarOpen" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
        </div>
        <!-- Overlay backdrop: cierra el drawer al hacer click -->
        <div class="sidebar-overlay" *ngIf="sidebarOpen" (click)="closeSidebar()"></div>
        <app-sidebar [class.open]="sidebarOpen" (closeSidebar)="closeSidebar()"></app-sidebar>
        <main class="main-content">
            <router-outlet></router-outlet>
        </main>
    </div>
</ng-container>
<ng-template #loginOnly>
    <router-outlet></router-outlet>
</ng-template>

<app-toast-container></app-toast-container>
<app-confirm-dialog></app-confirm-dialog>
