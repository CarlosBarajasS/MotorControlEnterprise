<div class="viewer-container">

    <div class="loading-state" *ngIf="isLoading">
        <div class="spinner"></div>
        <p>Conectando...</p>
    </div>

    <div class="error-state" *ngIf="hasError">
        <div class="icon">⚠️</div>
        <p>No se pudo conectar con la cámara.</p>
        <button (click)="retry()">Reintentar conexión</button>
    </div>

    <video #videoEl autoplay muted playsinline class="stream-frame"
        [class.hidden]="isLoading || hasError">
    </video>

    <div class="overlay-controls" *ngIf="!isLoading && !hasError && !hideOverlay">
        <div class="badge live">LIVE</div>
    </div>
</div>
