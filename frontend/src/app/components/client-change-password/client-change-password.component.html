<div class="change-password-wrapper">
    <div class="change-password-container">
        <div class="branding">
            <img src="assets/logo-dark.png?v=3" alt="NIRM GROUP" class="logo logo-for-dark">
            <img src="assets/logo-light.png?v=3" alt="NIRM GROUP" class="logo logo-for-light">
        </div>

        <div class="header">
            <h2>Cambio de contraseña requerido</h2>
            <p>Por seguridad, debes cambiar tu contraseña temporal antes de continuar al portal.</p>
        </div>

        @if (error()) {
        <div class="alert error">{{ error() }}</div>
        }

        @if (success()) {
        <div class="alert success">
            Contraseña actualizada correctamente. Redirigiendo a tus cámaras...
        </div>
        }

        <form (ngSubmit)="onSubmit()" class="password-form" *ngIf="!success()">
            <div class="form-group">
                <label for="currentPassword">Contraseña Temporal <span class="required">*</span></label>
                <div class="input-wrapper">
                    <span class="icon">🔒</span>
                    <input type="password" id="currentPassword" name="currentPassword" [(ngModel)]="currentPassword"
                        required placeholder="Tu contraseña actual">
                </div>
            </div>

            <div class="form-group">
                <label for="newPassword">Nueva Contraseña <span class="required">*</span></label>
                <div class="input-wrapper">
                    <span class="icon">🔑</span>
                    <input type="password" id="newPassword" name="newPassword" [(ngModel)]="newPassword" required
                        placeholder="Mínimo 8 caracteres">
                </div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirmar Nueva Contraseña <span class="required">*</span></label>
                <div class="input-wrapper">
                    <span class="icon">✓</span>
                    <input type="password" id="confirmPassword" name="confirmPassword" [(ngModel)]="confirmPassword"
                        required placeholder="Repite tu nueva contraseña">
                </div>
            </div>

            <button type="submit" class="submit-btn" [disabled]="loading()">
                @if (loading()) {
                Procesando...
                } @else {
                Guardar y Continuar
                }
            </button>
        </form>

        <div class="footer-note">
            NIRM GROUP &copy; 2026. Todos los derechos reservados.
        </div>
    </div>
</div>
