<div class="nvr-layout">

  <!-- TOPBAR -->
  <div class="nvr-topbar">
    <button class="btn-back" (click)="router.navigate(['/cameras'])">← Clientes</button>
    <span class="nvr-client-name">{{ clientName() }}</span>
    <div class="nvr-status-badges" *ngIf="!loading() && !loadError()">
      <span class="status-badge online"  *ngIf="onlineCount()  > 0">● {{ onlineCount() }} EN VIVO</span>
      <span class="status-badge offline" *ngIf="offlineCount() > 0">○ {{ offlineCount() }} Offline</span>
      <span class="status-badge muted"   *ngIf="cameras().length === 0">Sin cámaras</span>
    </div>
    <div class="nvr-topbar-spacer"></div>
    <button class="btn-add" (click)="router.navigate(['/cameras'])">+ Añadir Cámara</button>
  </div>

  <!-- GRID COMPARTIDO -->
  <app-camera-grid
    [cameras]="cameras()"
    [gatewayId]="gatewayId"
    [loading]="loading()"
    [loadError]="loadError()"
    emptyMessage="Este cliente no tiene cámaras configuradas"
    (retryClick)="loadData()">
  </app-camera-grid>

</div>
